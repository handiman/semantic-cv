name: CI/CD
on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags-ignore:
      - "**"
permissions:
  contents: write
  id-token: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 25
      - run: node -v

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.SUBMODULE_TOKEN }}
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Run tests
        continue-on-error: true
        run: |
          npm ci
          npm install -g xunit-viewer jsdom
          npm run test

      - name: Lint
        run: npm run lint

      - uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results.*

  version:
    runs-on: ubuntu-latest
    outputs:
      bump_type: ${{ steps.bump.outputs.type }}
      next_version: ${{ steps.final.outputs.version }}
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 25
      - run: node -v

      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.SUBMODULE_TOKEN }}
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch all tags explicitly
        run: |
          git fetch --tags --force
          git tag -l

      - name: Get last tag
        id: lasttag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Read package.json version
        id: pkg
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "version=$PKG_VERSION" >> $GITHUB_OUTPUT

      - name: Get commit message
        id: commit
        run: echo "msg=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT

      - name: Determine bump type
        id: bump
        run: |
          LAST="${{ steps.lasttag.outputs.tag }}"
          if [ -z "$LAST" ]; then LAST="v0.0.0"; fi

          COMMITS=$(git log "$LAST"..HEAD --pretty=%s)

          echo "Commits since last tag:"
          echo "$COMMITS"

          if echo "$COMMITS" | grep -qiE "BREAKING[ -]CHANGE:" || echo "$COMMITS" | grep -qE "^[a-zA-Z]+(\(.+\))?!:"; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$COMMITS" | grep -qE '^feat(\(.+\))?:'; then
            echo "type=minor" >> $GITHUB_OUTPUT
          elif echo "$COMMITS" | grep -qE '^fix(\(.+\))?:'; then
            echo "type=patch" >> $GITHUB_OUTPUT
          else
            echo "type=none" >> $GITHUB_OUTPUT
          fi

      - name: Calculate automatic version bump
        id: auto
        run: |
          LAST="${{ steps.lasttag.outputs.tag }}"
          if [ -z "$LAST" ]; then
            LAST="v0.0.0"
          fi

          VERSION=${LAST#v}
          IFS='.' read -r MA MI PA <<< "$VERSION"

          case "${{ steps.bump.outputs.type }}" in
            major) MA=$((MA+1)); MI=0; PA=0;;
            minor) MI=$((MI+1)); PA=0;;
            patch) PA=$((PA+1));;
            none)
              echo "version=$VERSION" >> $GITHUB_OUTPUT
              exit 0;;
          esac

          AUTO="$MA.$MI.$PA"
          echo "version=$AUTO" >> $GITHUB_OUTPUT

      - name: Determine final version # (manual override wins)
        id: final
        run: |
          npm install semver
          PKG="${{ steps.pkg.outputs.version }}"
          AUTO="${{ steps.auto.outputs.version }}"
          LAST="${{ steps.lasttag.outputs.tag }}"
          if [ -z "$LAST" ]; then LAST="v0.0.0"; fi
          LAST_VERSION=${LAST#v}

          DECISION=$(node <<EOF
            const semver = require('semver');
            const pkg = "$PKG";
            const auto = "$AUTO";
            const last = "$LAST_VERSION";

            if (semver.gt(pkg, last)) {
              console.log(pkg); // manual override
            } else {
              console.log(auto); // auto bump
            }
          EOF
          )
          echo "version=$DECISION" >> $GITHUB_OUTPUT
          echo "Next version will be: $DECISION"

  
  changelog:
    runs-on: ubuntu-latest
    needs: [version]
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.SUBMODULE_TOKEN }}
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch all tags
        run: git fetch --tags --force

      - name: Generate changelog
        run: |
          VERSION=${{ needs.version.outputs.next_version }}
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          echo "# v$VERSION" > CHANGELOG.md
          echo "" >> CHANGELOG.md

          echo "## Main Repository" >> CHANGELOG.md
          if [ -n "$LAST_TAG" ]; then
            git log $LAST_TAG..HEAD --pretty=format:"- %s (%h)" >> CHANGELOG.md
          else
            git log --pretty=format:"- %s (%h)" >> CHANGELOG.md
          fi
          echo "" >> CHANGELOG.md

          for SUB in src/themes src/core; do
            echo "## $SUB" >> CHANGELOG.md

            if [ -n "$LAST_TAG" ]; then
              OLD_SHA=$(git ls-tree $LAST_TAG $SUB | awk '{print $3}')
            else
              OLD_SHA=""
            fi

            NEW_SHA=$(git ls-tree HEAD $SUB | awk '{print $3}')

            if [ -z "$OLD_SHA" ] || [ "$OLD_SHA" = "$NEW_SHA" ]; then
              echo "_No changes_" >> CHANGELOG.md
            else
              git -C $SUB log $OLD_SHA..$NEW_SHA --pretty=format:"- %s (%h)" >> CHANGELOG.md
            fi

            echo "" >> CHANGELOG.md
          done

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v7
        with:
          name: changelog-v${{ needs.version.outputs.next_version }}
          path: CHANGELOG.md          

  release:
    needs: [test, version, changelog]
    runs-on: ubuntu-latest
    if: needs.version.outputs.bump_type != 'none' && github.ref_name == 'master'
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 25
          registry-url: "https://registry.npmjs.org"
      - run: node -v

      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.SUBMODULE_TOKEN }}
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Get last tag
        id: lasttag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Update package.json version
        if: needs.version.outputs.bump_type != 'none'
        run: npm version ${{ needs.version.outputs.next_version }} --no-git-tag-version --allow-same-version

      - name: Download changelog artifact
        uses: actions/download-artifact@v8
        with:
          name: changelog-v${{ needs.version.outputs.next_version }}
          path: ./tmp-changelog

      - name: Copy changelog
        run: |
          mkdir -p assets
          cp ./tmp-changelog/CHANGELOG.md ./CHANGELOG.md

      - name: Build + pack
        run: |
          npm ci
          npm run pack

      - name: Publish package to npm
        run: npm publish *.tgz --provenance --access public

      - name: Create and push tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "v${{ needs.version.outputs.next_version }}"
          git push origin "v${{ needs.version.outputs.next_version }}"

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: "v${{ needs.version.outputs.next_version }}"
          artifacts: "*.tgz"
          bodyFile: "CHANGELOG.md"
