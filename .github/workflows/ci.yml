name: CI/CD
on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags-ignore:
      - "**"
permissions:
  contents: write
  id-token: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 25
      - run: node -v

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.SUBMODULE_TOKEN }}
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Run tests
        continue-on-error: true
        run: |
          npm ci
          npm install -g xunit-viewer jsdom
          npm run test

      - name: Lint
        run: npm run lint

      - uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results.*

  version:
    runs-on: ubuntu-latest
    outputs:
      bump_type: ${{ steps.bump.outputs.type }}
      next_version: ${{ steps.final.outputs.version }}
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 25
      - run: node -v

      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.SUBMODULE_TOKEN }}
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch all tags explicitly
        run: |
          git fetch --tags --force
          git tag -l

      # Get last tag
      - name: Get last tag
        id: lasttag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # Read version from package.json
      - name: Read package.json version
        id: pkg
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "version=$PKG_VERSION" >> $GITHUB_OUTPUT

      # Get commit message
      - name: Get commit message
        id: commit
        run: echo "msg=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT

      # Determine bump type
      - name: Determine bump type
        id: bump
        run: |
          MSG="${{ steps.commit.outputs.msg }}"
          if echo "$MSG" | grep -qiE "BREAKING[ -]CHANGE:" || echo "$MSG" | grep -qE "^[a-zA-Z]+(\(.+\))?!:"; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif [[ "$MSG" =~ ^feat(\(.+\))?: ]]; then
            echo "type=minor" >> $GITHUB_OUTPUT
          elif [[ "$MSG" =~ ^fix(\(.+\))?: ]]; then
            echo "type=patch" >> $GITHUB_OUTPUT
          else
            echo "type=none" >> $GITHUB_OUTPUT
          fi

      # Calculate automatic version bump
      - name: Calculate auto version
        if: steps.bump.outputs.type != 'none'
        id: auto
        run: |
          LAST="${{ steps.lasttag.outputs.tag }}"
          if [ -z "$LAST" ]; then
            LAST="v0.0.0"
          fi

          VERSION=${LAST#v}
          IFS='.' read -r MA MI PA <<< "$VERSION"

          case "${{ steps.bump.outputs.type }}" in
            major) MA=$((MA+1)); MI=0; PA=0;;
            minor) MI=$((MI+1)); PA=0;;
            patch) PA=$((PA+1));;
            none)
              echo "version=$VERSION" >> $GITHUB_OUTPUT
              exit 0;;
          esac

          AUTO="$MA.$MI.$PA"
          echo "version=$AUTO" >> $GITHUB_OUTPUT

      # Determine final version (manual override wins)
      - name: Determine final version
        if: steps.bump.outputs.type != 'none'
        id: final
        run: |
          npm install semver
          PKG="${{ steps.pkg.outputs.version }}"
          AUTO="${{ steps.auto.outputs.version }}"
          LAST="${{ steps.lasttag.outputs.tag }}"
          if [ -z "$LAST" ]; then LAST="v0.0.0"; fi
          LAST_VERSION=${LAST#v}

          DECISION=$(node <<EOF
            const semver = require('semver');
            const pkg = "$PKG";
            const auto = "$AUTO";
            const last = "$LAST_VERSION";

            if (semver.gt(pkg, last)) {
              console.log(pkg); // manual override
            } else {
              console.log(auto); // auto bump
            }
          EOF
          )
          echo "version=$DECISION" >> $GITHUB_OUTPUT

  release:
    needs: [test, version]
    runs-on: ubuntu-latest
    if: needs.version.outputs.bump_type != 'none' && github.ref_name == 'master'
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 25
          registry-url: "https://registry.npmjs.org"
      - run: node -v

      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.SUBMODULE_TOKEN }}
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      # Get last tag
      - name: Get last tag
        id: lasttag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # Update package.json version
      - name: Update package.json version
        if: needs.version.outputs.bump_type != 'none'
        run: npm version ${{ needs.version.outputs.next_version }} --no-git-tag-version --allow-same-version

      # Generate CHANGELOG.md
      - name: Generate CHANGELOG.md
        run: |
          echo "## v${{ needs.version.outputs.next_version }} — $(date +'%Y-%m-%d')" > CHANGELOG.md
          echo "" >> CHANGELOG.md

          LAST="${{ steps.lasttag.outputs.tag }}"
          if git rev-parse "$LAST" >/dev/null 2>&1; then
            git log --ignore-submodules=all "$LAST"..HEAD --pretty=format:"- %s" >> CHANGELOG.md
          else
            git log --ignore-submodules=all HEAD --pretty=format:"- %s" >> CHANGELOG.md
          fi

          echo "" >> CHANGELOG.md

      # Build + pack
      - name: Create package tarball
        run: |
          npm ci
          npm run pack

      # Publish package to npm
      - name: Publish to npm
        run: npm publish *.tgz --provenance --access public

      # Create and push tag
      - name: Create tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "v${{ needs.version.outputs.next_version }}"
          git push origin "v${{ needs.version.outputs.next_version }}"

      # Create GitHub Release
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: "v${{ needs.version.outputs.next_version }}"
          artifacts: "*.tgz"
          bodyFile: "CHANGELOG.md"
