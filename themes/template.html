<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="author" content="{{name}}" />
  <meta name="generator" content="semantic-cv {{theme}}" />
  <meta name="theme" content="{{theme}}" />
  {{og}}
  {{twitter}}
  <title>{{name}}</title>
  <!-- CV analysis results: {{analysisResults}} -->
  <script type="application/ld+json"></script>
  <script>
    class Person {
      constructor(inner) {
        this._inner = "string" === typeof inner ? JSON.parse(inner) : inner;
      }
      arrayOf(obj) { return obj && obj.map ? obj : obj ? [obj] : []; }
      firstOf(obj) { return this.arrayOf(obj)[0]; }
      get name() { return this.firstOf(this._inner.name); }
      get jobTitle() { return this.firstOf(this._inner.jobTitle); }
      get description() { return this.firstOf(this._inner.description); }
      get image() { return this.firstOf(this._inner.image); }
      get url() { return this.firstOf(this._inner.url); }
      get email() { return this.firstOf(this._inner.email); }
      get telephone() { return this.firstOf(this._inner.telephone); }
      get sameAs() { return this.arrayOf(this._inner.sameAs); }
      get alumniOf() { return this.arrayOf(this._inner.alumniOf); }
      get worksFor() { return this.arrayOf(this._inner.worksFor).filter(item => item.worksFor && "Organization" === item.worksFor["@type"]); }
      get hasCertification() { return this.arrayOf(this._inner.hasCertification); }
      get hasCredential() { return this.arrayOf(this._inner.hasCredential); }
      get knowsLanguage() { return this.arrayOf(this._inner.knowsLanguage); }
      get knowsAbout() { return this.arrayOf(this._inner.knowsAbout); }
      get skills() { return this.arrayOf(this._inner.skills); }
      get lifeEvent() { return this.arrayOf(this._inner.lifeEvent); }
      get projects() { return this.arrayOf(this._inner.worksFor).filter(item => item.worksFor && "Project" === item.worksFor["@type"]); }
    }
    class SemanticCvTheme extends HTMLElement {
      constructor() { super(); }
      set person(person) { this._person = person; this.render(person); }
      get person() { return this._person; }
      normalizeArray() {
        // Helper method that returns an array without empty items
        let result = [];
        for (const arg of arguments) {
          if (arg && arg.map) {
            result = [...result, ...arg];
          } else if (arg) {
            result.push(arg);
          }
        }
        return result.filter(item => item ? true : false);
      }
      faIcon(url) {
        // Helper method trying to parse a fontawesome icon name suitable for a social network, email, phone, website.
        const person = this._person;
        function faGlyph(url) {
          if (url.indexOf("microsoft.com") > -1) {
            return "windows";
          }
          if (url.indexOf("://x.com") > 1 || url.indexOf("://www.x.com") > -1) {
            return "twitter";
          }
          if (url.indexOf("mailto:") > -1) {
            return "envelope";
          }
          if (url.indexOf("tel:") > -1) {
            return "phone";
          }
          if (url === person.url) {
            return "globe";
          }
          let icon = url.substring(url.indexOf("://") + 3).replace("www.", "");
          return `${icon.substring(0, icon.indexOf("."))}`;
        }
        function faCategory(iconName) {
          switch (iconName) {
            case "phone":
            case "envelope":
            case "globe":
              return "fas";
            default:
              return "fab";
          }
        }
        const glyph = faGlyph(url);
        const category = faCategory(glyph);
        return `<i class="${category} fa-${glyph}"></i>`;
      }
      render() { }
    }
    // For testability
    window.Person = Person;
    window.SemanticCvTheme = SemanticCvTheme;
  </script>
  <script type="module"></script>
  <style type="text/css"></style>
</head>

<body>
  <semantic-cv-theme-{{theme}}></semantic-cv-theme-{{theme}}>
  <script type="module">
    const jsonld = document.querySelector('script[type="application/ld+json"]').textContent;
    const theme = document.querySelector("semantic-cv-theme-{{theme}}");
    theme.person = new Person(jsonld);
  </script>
</body>

</html>
